<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 급식 - MealWise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MealWise</h1>
            <p>오늘의 학교 급식 정보를 확인하세요</p>
        </header>

        <main class="main-card">
            <div class="school-info">
                <div class="school-name-container">
                    <h2 id="display-school-name">학교를 선택해주세요</h2>
                    <p id="display-school-loc">아래 버튼을 눌러 학교를 검색하세요</p>
                </div>
                <button class="change-btn" id="open-search-btn">
                    <i class="fas fa-search"></i> 변경
                </button>
            </div>

            <div class="date-display">
                <h3 id="display-date">2024년 03월 12일</h3>
            </div>

            <div class="meal-type-tabs">
                <div class="tab" data-type="1">조식</div>
                <div class="tab active" data-type="2">중식</div>
                <div class="tab" data-type="3">석식</div>
            </div>

            <div class="meal-content" id="meal-container">
                <!-- Meal items will be injected here -->
                <div class="loader"></div>
            </div>

            <div class="meal-info-footer">
                <span id="display-calorie">칼로리 정보 없음</span>
                <span id="display-origin">원산지 정보 없음</span>
            </div>
        </main>
    </div>

    <!-- School Search Modal -->
    <div class="modal" id="search-modal">
        <div class="modal-content">
            <h3>학교 검색</h3>
            <div class="search-input-group">
                <input type="text" id="school-search-input" placeholder="학교 이름을 입력하세요 (예: 서울고)">
            </div>
            <div class="search-results" id="search-results">
                <!-- Search results will be injected here -->
                <p style="text-align: center; color: var(--text-muted); padding: 1rem;">학교 이름을 입력하고 Enter를 누르세요</p>
            </div>
            <button class="change-btn" id="close-search-btn" style="width: 100%; margin-top: 1.5rem;">닫기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
